  <!-- Custom Hero Script for Landing Page: deal-flow pipeline animation -->
  <script>
    window.$docsify.plugins = [].concat(window.$docsify.plugins, function (hook) {
      hook.doneEach(function () {
        // Deal-flow pipeline: streams of deals flowing left-to-right through
        // 7 faint stage gates (Qualify ... Close), mirroring the journey strip below.
        const canvas = document.getElementById('deal-flow-canvas');
        if (!canvas || canvas.dataset.initialized) return;
        canvas.dataset.initialized = 'true';

        const ctx = canvas.getContext('2d');
        const GATES = 7;
        const LANES = 6;
        const DOTS_PER_LANE = 3;
        const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

        let W = 0, H = 0, gateXs = [], laneYs = [];

        const resize = () => {
          const dpr = window.devicePixelRatio || 1;
          W = canvas.parentElement.offsetWidth;
          H = canvas.parentElement.offsetHeight;
          canvas.width = W * dpr;
          canvas.height = H * dpr;
          canvas.style.width = W + 'px';
          canvas.style.height = H + 'px';
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
          const pad = W * 0.06;
          gateXs = Array.from({ length: GATES }, (_, i) => pad + (i * (W - 2 * pad)) / (GATES - 1));
          laneYs = Array.from({ length: LANES }, (_, i) => H * (0.14 + (i * 0.72) / (LANES - 1)));
        };
        window.addEventListener('resize', resize);
        resize();

        // Each dot: lane index, x position, base speed, phase for wobble
        const dots = [];
        for (let l = 0; l < LANES; l++) {
          for (let d = 0; d < DOTS_PER_LANE; d++) {
            dots.push({
              lane: l,
              x: Math.random() * W,
              speed: 0.5 + Math.random() * 0.7,
              phase: Math.random() * Math.PI * 2,
            });
          }
        }

        const SLOW_RADIUS = 46; // px around a gate where dots decelerate ("the stage takes work")

        const drawFrame = (t) => {
          ctx.clearRect(0, 0, W, H);

          // Lane guide lines — barely visible
          ctx.lineWidth = 1;
          laneYs.forEach((y) => {
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(W, y);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.045)';
            ctx.stroke();
          });

          // Stage gates — faint rings with a slow breathing pulse
          gateXs.forEach((x, i) => {
            const pulse = reducedMotion ? 0 : Math.sin(t / 900 + i * 0.9) * 0.03;
            ctx.beginPath();
            ctx.moveTo(x, H * 0.06);
            ctx.lineTo(x, H * 0.94);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.stroke();
            laneYs.forEach((y) => {
              ctx.beginPath();
              ctx.arc(x, y, 5, 0, Math.PI * 2);
              ctx.strokeStyle = 'rgba(255, 255, 255, ' + (0.13 + pulse) + ')';
              ctx.stroke();
            });
          });

          // Deal dots — drift right, slow near gates, small trailing tail
          dots.forEach((p) => {
            const y = laneYs[p.lane] + (reducedMotion ? 0 : Math.sin(t / 1400 + p.phase) * 2.5);
            if (!reducedMotion) {
              let nearest = Infinity;
              gateXs.forEach((gx) => {
                const dist = Math.abs(p.x - gx);
                if (dist < nearest) nearest = dist;
              });
              const factor = nearest < SLOW_RADIUS ? 0.22 + 0.78 * (nearest / SLOW_RADIUS) : 1;
              p.x += p.speed * factor;
              if (p.x > W + 12) { p.x = -12; p.speed = 0.5 + Math.random() * 0.7; }
            }
            const grad = ctx.createLinearGradient(p.x - 26, y, p.x, y);
            grad.addColorStop(0, 'rgba(147, 197, 253, 0)');
            grad.addColorStop(1, 'rgba(147, 197, 253, 0.35)');
            ctx.strokeStyle = grad;
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(p.x - 26, y);
            ctx.lineTo(p.x, y);
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(p.x, y, 2.2, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.65)';
            ctx.fill();
          });
        };

        if (reducedMotion) {
          drawFrame(0); // single static frame — gates, lanes, resting dots
          return;
        }

        const animate = (t) => {
          // Stop cleanly if the user navigated away from the landing page
          if (!document.getElementById('deal-flow-canvas')) return;
          drawFrame(t);
          requestAnimationFrame(animate);
        };
        requestAnimationFrame(animate);
      });
    });
  </script>
