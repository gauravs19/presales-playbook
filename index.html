  <!-- Custom Footer Plugin -->

    window.$docsify.plugins = [].concat(function (hook, vm) {
      var footer = [
        '<hr/>',
        '<footer style="text-align: center; margin-top: 2.5rem; padding-bottom: 1rem; color: #666;">',
        '  <p>',
        '    <strong>The Enterprise Presales Playbook</strong> by Gaurav Sharma.<br/>',

        '      <a href="https://www.linkedin.com/in/gauravs19/" target="_blank" style="color: var(--theme-color, #1e3a8a); text-decoration: none; font-weight: 600;">LinkedIn Profile</a>',
        '    </span>',
        '  </p>',
        '</footer>'
      ].join('');

      hook.afterEach(function (html) {
        return html + footer;
      });

      // Fresh-tab deep links: on the very first render the ?id= scroll races
      // auto2top's scroll-to-0 and can lose. Re-apply it a few times after the
      // initial page renders; stop as soon as the user scrolls on their own.
      var initialAnchorDone = false;
      hook.doneEach(function () {
        if (initialAnchorDone) return;
        initialAnchorDone = true;
        var id = vm.route.query && vm.route.query.id;
        if (!id) return;
        var userScrolled = false;
        var onUser = function () { userScrolled = true; };
        window.addEventListener('wheel', onUser, { passive: true });
        window.addEventListener('touchmove', onUser, { passive: true });
        [150, 600, 1400].forEach(function (delay) {
          setTimeout(function () {
            var el = document.getElementById(id);
            if (el && !userScrolled) {
              window.scrollTo(0, el.getBoundingClientRect().top + window.pageYOffset - 16);
            }
          }, delay);
        });
        setTimeout(function () {
          window.removeEventListener('wheel', onUser);
          window.removeEventListener('touchmove', onUser);
        }, 1500);
      });
    }, window.$docsify.plugins);
  </script>

  <!-- Custom Hero Script for Landing Page: radar sweep animation -->
  <script>
    window.$docsify.plugins = [].concat(window.$docsify.plugins, function (hook) {
      hook.doneEach(function () {
        // Radar sweep: a slow rotating beam over faint range rings; blips (deals)
        // light up as the beam passes them, then fade until the next revolution.
        const canvas = document.getElementById('hero-radar-canvas');
        if (!canvas || canvas.dataset.initialized) return;
        canvas.dataset.initialized = 'true';

        const ctx = canvas.getContext('2d');
        const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const REV_MS = 18000;          // one revolution ~18s
        const TAU = Math.PI * 2;
        const BLIP_COUNT = 14;

        let W = 0, H = 0, CX = 0, CY = 0, R = 0;

        const resize = () => {
          const dpr = window.devicePixelRatio || 1;
          W = canvas.parentElement.offsetWidth;
          H = canvas.parentElement.offsetHeight;
          canvas.width = W * dpr;
          canvas.height = H * dpr;
          canvas.style.width = W + 'px';
          canvas.style.height = H + 'px';
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
          CX = W / 2;
          CY = H / 2;
          R = Math.sqrt(CX * CX + CY * CY); // reach the hero corners
        };
        window.addEventListener('resize', resize);
        resize();

        // Blips: fixed polar positions, re-randomized occasionally on wrap
        const blips = Array.from({ length: BLIP_COUNT }, () => ({
          angle: Math.random() * TAU,
          radius: 0.25 + Math.random() * 0.68, // fraction of R
          size: 1.6 + Math.random() * 1.6,
        }));

        const drawStatic = () => {
          // Range rings
          ctx.lineWidth = 1;
          [0.22, 0.42, 0.62, 0.82].forEach((f) => {
            ctx.beginPath();
            ctx.arc(CX, CY, R * f, 0, TAU);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.055)';
            ctx.stroke();
          });
          // Crosshair lines
          ctx.strokeStyle = 'rgba(255, 255, 255, 0.035)';
          ctx.beginPath(); ctx.moveTo(0, CY); ctx.lineTo(W, CY); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(CX, 0); ctx.lineTo(CX, H); ctx.stroke();
        };

        const drawFrame = (t) => {
          ctx.clearRect(0, 0, W, H);
          drawStatic();

          const beam = reducedMotion ? TAU * 0.12 : ((t % REV_MS) / REV_MS) * TAU;

          if (!reducedMotion) {
            // Sweep wedge: thin trailing gradient behind the beam edge
            const TRAIL = TAU * 0.16;
            const STEPS = 26;
            for (let s = 0; s < STEPS; s++) {
              const a0 = beam - (TRAIL * (s + 1)) / STEPS;
              const a1 = beam - (TRAIL * s) / STEPS;
              ctx.beginPath();
              ctx.moveTo(CX, CY);
              ctx.arc(CX, CY, R, a0, a1);
              ctx.closePath();
              ctx.fillStyle = 'rgba(147, 197, 253, ' + (0.05 * (1 - s / STEPS)) + ')';
              ctx.fill();
            }
            // Beam leading edge
            ctx.beginPath();
            ctx.moveTo(CX, CY);
            ctx.lineTo(CX + Math.cos(beam) * R, CY + Math.sin(beam) * R);
            ctx.strokeStyle = 'rgba(191, 219, 254, 0.28)';
            ctx.lineWidth = 1.5;
            ctx.stroke();
          }

          // Blips: brightest just after the beam passes, fading until next pass
          blips.forEach((b) => {
            const x = CX + Math.cos(b.angle) * R * b.radius;
            const y = CY + Math.sin(b.angle) * R * b.radius;
            let alpha;
            if (reducedMotion) {
              alpha = 0.3;
            } else {
              let behind = beam - b.angle;         // how far past the blip the beam is
              behind = ((behind % TAU) + TAU) % TAU;
              alpha = Math.max(0, 0.85 * (1 - behind / (TAU * 0.55)));
            }
            if (alpha <= 0.02) return;
            const glow = ctx.createRadialGradient(x, y, 0, x, y, b.size * 5);
            glow.addColorStop(0, 'rgba(147, 197, 253, ' + alpha * 0.5 + ')');
            glow.addColorStop(1, 'rgba(147, 197, 253, 0)');
            ctx.fillStyle = glow;
            ctx.beginPath();
            ctx.arc(x, y, b.size * 5, 0, TAU);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x, y, b.size, 0, TAU);
            ctx.fillStyle = 'rgba(255, 255, 255, ' + alpha + ')';
            ctx.fill();
          });

          // Center hub
          ctx.beginPath();
          ctx.arc(CX, CY, 2.5, 0, TAU);
          ctx.fillStyle = 'rgba(255, 255, 255, 0.18)';
          ctx.fill();
        };

        if (reducedMotion) {
          drawFrame(0); // static frame: rings, crosshair, resting blips
          return;
        }

        const animate = (t) => {
          // Stop cleanly if the user navigated away from the landing page
          if (!document.getElementById('hero-radar-canvas')) return;
          drawFrame(t);
          requestAnimationFrame(animate);
        };
        requestAnimationFrame(animate);
      });
    });
  </script>
